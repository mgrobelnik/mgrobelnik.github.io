<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="Matej Grobelnik — freelance software engineer building robust and scalable software.">
  <title>Matej Grobelnik</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #111111;
      --muted: #555555;
      --link: #111111;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --fg: #f5f5f5;
        --muted: #b3b3b3;
        --link: #f5f5f5;
      }
    }

    * { box-sizing: border-box; }

    html {
      background: var(--bg);
      color: var(--fg);
      font: 14px/1.6 Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      padding: 2rem 1.25rem 4rem;
      background: var(--bg);
      color: var(--fg);
    }

    main {
      max-width: 72ch;
    }

    h1, h2, p, ul {
      margin: 0 0 1rem;
    }

    h1 {
      font-size: 1.125rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    h1::before {
      content: ">  ";
      color: var(--muted);
    }

    h1::after {
      content: "_";
      color: var(--muted);
      animation: blink 1.25s steps(1, end) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    h2 {
      margin-top: 0;
      font-size: 1rem;
      font-weight: 400;
    }

    .section-rule {
      margin: 2rem 0 1rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
    }

    p, li {
      color: var(--fg);
    }

    .muted {
      color: var(--muted);
    }

    ul {
      margin: 0 0 1rem;
      padding: 0;
      list-style: none;
    }

    li::before {
      content: "- ";
      color: var(--muted);
    }

    a {
      color: var(--link);
      text-underline-offset: 0.15em;
    }
  </style>
</head>
<body>
  <main>
    <section aria-labelledby="intro">
      <h1 id="intro">Matej Grobelnik</h1>
      <p>Freelance software engineer focused on building robust and scalable software.</p>
      <p class="muted">Based between Rotterdam, The Netherlands and Ljubljana, Slovenia.</p>
    </section>
    <p class="section-rule" aria-hidden="true">~~~~</p>
    <section aria-labelledby="contact">
      <h2 id="contact">Contact</h2>
      <ul>
        <li>Email: <a href="mailto:hello@matejgrobelnik.com">hello@matejgrobelnik.com</a></li>
        <li>LinkedIn: <a href="https://www.linkedin.com/in/matej-grobelnik/">linkedin.com/in/matej-grobelnik</a></li>
      </ul>
    </section>
  </main>
</body>
</html>
